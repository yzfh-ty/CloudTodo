services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: cloudtodo-web
    environment:
      PORT: 80
      APP_NAME: ${APP_NAME:-CloudTodo Web}
      APP_ENV: ${APP_ENV:-production}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:3000/api}
    ports:
      - "${WEB_PORT:-8080}:80"
