name: Server CI

on:
  workflow_dispatch:

jobs:
  server:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cloudtodo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d cloudtodo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      PORT: 3000
      APP_NAME: CloudTodo Server
      APP_BASE_URL: http://127.0.0.1:3000
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/cloudtodo?schema=public
      JWT_ACCESS_SECRET: test-access-secret
      JWT_REFRESH_SECRET: test-refresh-secret
      WEBHOOK_SIGNING_SECRET: test-webhook-secret
      ADMIN_SESSION_SECRET: test-admin-session-secret
      SCHEDULER_ENABLED: false
    defaults:
      run:
        working-directory: apps/server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply migrations
        run: npm run prisma:migrate:deploy

      - name: Run unit tests
        run: npm test

      - name: Build server
        run: npm run build
